name: Weekly devel → main PR

on:
  schedule:
    - cron: '0 14 * * 0'  # Every Sunday at 9am EST (14:00 UTC)
  workflow_dispatch:

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if devel is ahead of main
        id: check
        run: |
          git fetch origin main devel
          AHEAD=$(git rev-list origin/main..origin/devel --count)
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          echo "devel is $AHEAD commit(s) ahead of main"

      - name: Create PR if devel is ahead
        if: steps.check.outputs.ahead != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: |
            ## Weekly sync

            This PR was automatically created by the weekly sync workflow.

            It merges all changes accumulated in `devel` into `main`.

            Auto-merge is enabled — it will merge automatically once all required checks pass.
        run: |
          EXISTING=$(gh pr list --base main --head devel --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists — enabling auto-merge."
            gh pr merge "$EXISTING" --auto --squash
          else
            PR_URL=$(gh pr create \
              --base main \
              --head devel \
              --title "chore: weekly sync devel → main ($(date +'%Y-%m-%d'))" \
              --body "$PR_BODY")
            echo "Created $PR_URL — enabling auto-merge."
            gh pr merge "$PR_URL" --auto --squash
          fi
