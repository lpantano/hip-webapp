name: Build and Test

on:
  # Trigger on push to main and pull requests
  push:
    branches: [main]
  pull_request:
    branches: [main]
  
  # Allow manual trigger
  workflow_dispatch:

# Cancel in-progress workflows on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Test Frontend Build
  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18, 20]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint
        
      - name: Type check
        run: npx tsc --noEmit
        
      - name: Build for production
        run: npm run build
        
      - name: Build for development
        run: npm run build:dev
        
      - name: Upload build artifacts
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 1

  # Job 2: Test Supabase Edge Functions
  edge-functions:
    name: Edge Functions Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
          
      - name: Check Edge Function syntax
        run: |
          if [ -d "supabase/functions" ]; then
            for func_dir in supabase/functions/*/; do
              if [ -f "${func_dir}index.ts" ]; then
                echo "Checking ${func_dir}index.ts"
                deno check "${func_dir}index.ts"
              fi
            done
          else
            echo "No Supabase functions directory found, skipping..."
          fi
          
      - name: Lint Edge Functions
        run: |
          if [ -d "supabase/functions" ]; then
            for func_dir in supabase/functions/*/; do
              if [ -f "${func_dir}index.ts" ]; then
                echo "Linting ${func_dir}index.ts"
                deno lint "${func_dir}index.ts" || true
              fi
            done
          else
            echo "No Supabase functions directory found, skipping..."
          fi

  # Job 3: Database Migration Check
  database-check:
    name: Database Migrations
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install Supabase CLI
        run: npm install -g @supabase/cli
        
      - name: Check migration files syntax
        run: |
          if [ -d "supabase/migrations" ]; then
            echo "Found migration files:"
            ls -la supabase/migrations/
            
            # Basic SQL syntax check for migration files
            for migration in supabase/migrations/*.sql; do
              if [ -f "$migration" ]; then
                echo "Checking syntax of $migration"
                # Basic check - ensure file is not empty and has basic SQL structure
                if [ -s "$migration" ]; then
                  echo "✅ $migration is not empty"
                else
                  echo "⚠️  $migration is empty"
                fi
              fi
            done
          else
            echo "No migrations directory found, skipping..."
          fi

  # Job 4: Security and Dependency Check
  security-check:
    name: Security & Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true
        
      - name: Check for outdated packages
        run: npm outdated || true

  # Job 5: Preview Build Test
  preview-test:
    name: Preview Server Test
    runs-on: ubuntu-latest
    needs: frontend-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build application
        run: npm run build
        
      - name: Test preview server
        run: |
          # Start preview server in background
          npm run preview &
          PREVIEW_PID=$!
          
          # Wait for server to start
          sleep 10
          
          # Test if server is responding
          curl -f http://localhost:4173 || exit 1
          
          # Kill preview server
          kill $PREVIEW_PID
          
  # Job 6: Configuration Validation
  config-validation:
    name: Configuration Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Validate package.json
        run: |
          # Check if package.json is valid JSON
          cat package.json | jq empty
          echo "✅ package.json is valid JSON"
          
      - name: Validate TypeScript config
        run: |
          # Check if tsconfig files are valid
          for config in tsconfig*.json; do
            if [ -f "$config" ]; then
              echo "Validating $config"
              cat "$config" | jq empty
              echo "✅ $config is valid JSON"
            fi
          done
          
      - name: Validate other config files
        run: |
          # Check tailwind config
          if [ -f "tailwind.config.ts" ]; then
            echo "✅ Tailwind config found"
          fi
          
          # Check vite config
          if [ -f "vite.config.ts" ]; then
            echo "✅ Vite config found"
          fi
          
          # Check if .env.example exists (good practice)
          if [ -f ".env.example" ]; then
            echo "✅ .env.example found"
          else
            echo "⚠️  Consider adding .env.example for environment variable documentation"
          fi

  # Job 7: Build Summary
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [frontend-build, edge-functions, database-check, security-check, config-validation]
    if: always()
    
    steps:
      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Build: ${{ needs.frontend-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Edge Functions: ${{ needs.edge-functions.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Database Check: ${{ needs.database-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Check: ${{ needs.security-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Config Validation: ${{ needs.config-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Overall status
          if [ "${{ needs.frontend-build.result }}" = "success" ] && [ "${{ needs.edge-functions.result }}" = "success" ] && [ "${{ needs.database-check.result }}" = "success" ] && [ "${{ needs.config-validation.result }}" = "success" ]; then
            echo "✅ **All critical checks passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some checks failed. Please review the logs.**" >> $GITHUB_STEP_SUMMARY
          fi