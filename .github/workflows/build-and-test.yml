name: Build and Test

on:
  # Trigger on push to main and pull requests
  push:
    branches: [main, devel]
  pull_request:
    branches: [main, devel]

  # Allow manual trigger
  workflow_dispatch:

# Cancel in-progress workflows on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Test Frontend Build
  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build for production
        run: npm run build

      - name: Build for development
        run: npm run build:dev

      - name: Upload build artifacts
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 1

  # Job 4: Security and Dependency Check
  security-check:
    name: Security & Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for outdated packages
        run: npm outdated || true

  # Job 5: Preview Build Test
  preview-test:
    name: Preview Server Test
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Test preview server
        run: |
          # Start preview server in background
          npm run preview &
          PREVIEW_PID=$!

          # Wait for server to start
          sleep 10

          # Test if server is responding
          curl -f http://localhost:4173 || exit 1

          # Kill preview server
          kill $PREVIEW_PID

  # Job 6: Configuration Validation
  config-validation:
    name: Configuration Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate package.json
        run: |
          # Check if package.json is valid JSON
          cat package.json | jq empty
          echo "✅ package.json is valid JSON"

      - name: Validate TypeScript config
        run: |
          # Check if tsconfig files are valid using TypeScript compiler
          echo "Validating TypeScript configuration files..."
          npx tsc --noEmit --project tsconfig.json
          npx tsc --noEmit --project tsconfig.app.json
          npx tsc --noEmit --project tsconfig.node.json
          echo "✅ All TypeScript configurations are valid"

      - name: Validate other config files
        run: |
          # Check tailwind config
          if [ -f "tailwind.config.ts" ]; then
            echo "✅ Tailwind config found"
          fi

          # Check vite config
          if [ -f "vite.config.ts" ]; then
            echo "✅ Vite config found"
          fi

          # Check if .env.example exists (good practice)
          if [ -f ".env.example" ]; then
            echo "✅ .env.example found"
          else
            echo "⚠️  Consider adding .env.example for environment variable documentation"
          fi

  # Job 7: Build Summary
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [frontend-build, security-check, config-validation]
    if: always()

    steps:
      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Build: ${{ needs.frontend-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Check: ${{ needs.security-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Config Validation: ${{ needs.config-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall status
          if [ "${{ needs.frontend-build.result }}" = "success" ]  && [ "${{ needs.config-validation.result }}" = "success" ]; then
            echo "✅ **All critical checks passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some checks failed. Please review the logs.**" >> $GITHUB_STEP_SUMMARY
          fi
