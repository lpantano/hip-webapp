name: Auto Version Bump

on:
  push:
    branches:
      - main

  # Allow manual trigger with version type selection
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  auto-version:
    name: Automatic Version Bump
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, 'chore: bump version')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for commit analysis
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Determine version bump type
        id: determine_version
        run: |
          # If manually triggered, use the input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version_type=${{ inputs.version_type }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get commits since last version bump
          LAST_VERSION_COMMIT=$(git log --grep="chore: bump version" --format="%H" -n 1)

          if [ -z "$LAST_VERSION_COMMIT" ]; then
            # No version bump found, check all commits in this push
            COMMITS=$(git log --format="%s" ${{ github.event.before }}..${{ github.event.after }})
          else
            # Check commits since last version bump
            COMMITS=$(git log --format="%s" ${LAST_VERSION_COMMIT}..HEAD)
          fi

          echo "Analyzing commits:"
          echo "$COMMITS"

          # Determine version type based on conventional commits
          # BREAKING CHANGE or feat!: or fix!: = major
          # feat: = minor
          # fix: = patch
          # default = patch

          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^[a-z]+!:"; then
            VERSION_TYPE="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            VERSION_TYPE="minor"
          elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?:"; then
            VERSION_TYPE="patch"
          else
            # Default to patch for other commits
            VERSION_TYPE="patch"
          fi

          echo "Determined version type: $VERSION_TYPE"
          echo "version_type=$VERSION_TYPE" >> $GITHUB_OUTPUT

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: bump_version
        run: |
          npm version ${{ steps.determine_version.outputs.version_type }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.new }}" \
                     -m "Automated version bump: ${{ steps.current_version.outputs.current }} → ${{ steps.bump_version.outputs.new }}" \
                     -m "Bump type: ${{ steps.determine_version.outputs.version_type }}" \
                     -m "[skip ci]"
          git push

      - name: Create git tag
        run: |
          git tag v${{ steps.bump_version.outputs.new }}
          git push origin v${{ steps.bump_version.outputs.new }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.bump_version.outputs.new }}
          name: Release v${{ steps.bump_version.outputs.new }}
          body: |
            ## Changes in v${{ steps.bump_version.outputs.new }}

            Version bumped from ${{ steps.current_version.outputs.current }} to ${{ steps.bump_version.outputs.new }}

            **Bump type:** ${{ steps.determine_version.outputs.version_type }}

            ### Commits
            ${{ github.event.head_commit.message }}

            See the [commit history](https://github.com/${{ github.repository }}/commits/v${{ steps.bump_version.outputs.new }}) for full details.
          draft: false
          prerelease: false

      - name: Summary
        run: |
          echo "## Version Bump Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Previous version:** ${{ steps.current_version.outputs.current }}" >> $GITHUB_STEP_SUMMARY
          echo "- **New version:** ${{ steps.bump_version.outputs.new }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bump type:** ${{ steps.determine_version.outputs.version_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Version bumped successfully!" >> $GITHUB_STEP_SUMMARY
